<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging Hub UI</title>
    <!-- Favicons & PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1976D2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      html,
      body,
      canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- Socket.io client is auto-served by the socket.io server -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
    <script>
      // State variables
      let connected = false;
      let socket = null;
      let clientId = "";
      let users = [];
      let messages = [];
      let selectedUser = null;
      let currentRoomId = null;

      // Canvas variables
      let userPositions = {};
      let messageAnimations = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        background(0);
        textAlign(CENTER, CENTER);
        textSize(20);
      }

      function draw() {
        background(0, 20); // slight fade

        // Draw users as circles in a circle
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;

        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          userPositions[user] = { x, y };

          fill(user === clientId ? "blue" : "green");
          if (user === selectedUser) {
            stroke("white");
            strokeWeight(3);
          } else {
            noStroke();
          }
          ellipse(x, y, 80, 80);
          noStroke();
          fill(255);
          textAlign(CENTER, CENTER);
          text(user.substring(0, 6), x, y);
        });

        // Draw message animations (flames/meteors)
        messageAnimations.forEach((anim, index) => {
          anim.progress += 0.015; // Slower for better visibility

          // Apply offset delay for second flame
          const effectiveProgress = Math.max(
            0,
            anim.progress - (anim.offset || 0),
          );

          if (effectiveProgress >= 1) {
            messageAnimations.splice(index, 1);
            return;
          }

          const fromPos = userPositions[anim.from] || {
            x: centerX,
            y: centerY,
          };
          const toPos = userPositions[anim.to] || { x: centerX, y: centerY };
          const x = lerp(fromPos.x, toPos.x, effectiveProgress);
          const y = lerp(fromPos.y, toPos.y, effectiveProgress);

          // Flame/meteor appearance
          const size = 20 + sin(effectiveProgress * PI * 4) * 8; // Bigger pulsing size
          const alpha = (1 - effectiveProgress) * 255; // Fade out

          // Color based on message type and flame
          if (anim.broadcast) {
            fill(255, 255, 0, alpha); // Yellow for broadcast
          } else {
            // Red-orange flame colors
            if (anim.flameId === 0) {
              fill(255, 100, 0, alpha); // Orange flame
            } else {
              fill(255, 50, 0, alpha); // Red flame
            }
          }

          noStroke();
          // Draw elongated flame shape
          ellipse(x, y, size * 1.5, size * 0.7);

          // Add a small glow/trail effect
          fill(255, 200, 0, alpha * 0.3);
          ellipse(x, y, size * 2.5, size * 1.2);
        });
      }

      function mousePressed() {
        // Find clicked user
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;
        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          const d = dist(mouseX, mouseY, x, y);
          if (d < 40 && user !== clientId) {
            // within circle
            selectedUser = user;
            sendMessage(false);
          }
        });
      }

      // ── Socket.io / Feathers wire-protocol helpers ──────────────────────────

      function connect() {
        socket = io(location.origin, { transports: ["websocket"] });

        socket.on("connect", () => {
          connected = true;
          console.log("Connected, socket id:", socket.id);
          // Load message history once connected
          socket.emit("messages::find", {}, (err, history) => {
            if (err) return console.error("History error:", err);
            history.forEach((h) =>
              messages.push({
                from: h.senderId,
                payload: h.payload,
                isBroadcast: h.isBroadcast,
                ts: new Date(h.timestamp),
                me: h.senderId === clientId,
              }),
            );
          });
        });

        socket.on("disconnect", () => {
          connected = false;
          console.log("Disconnected");
        });

        // Server-emitted presence events
        socket.on("register-success", (data) => {
          clientId = data.id;
          console.log("Registered as", clientId);
        });

        socket.on("user-list", (data) => {
          users = data.users;
          console.log("Users:", users);
        });

        socket.on("user-joined", (data) => console.log("User joined", data.id));
        socket.on("user-left", (data) => console.log("User left", data.id));

        // Feathers service event: 'messages created'
        socket.on("messages created", (msg) => {
          messages.push({
            from: msg.senderId,
            to: msg.recipientId,
            payload: msg.payload,
            isBroadcast: msg.isBroadcast,
            ts: new Date(msg.timestamp),
            me: false, // incoming — sender already has it locally
          });
          for (let i = 0; i < 2; i++) {
            messageAnimations.push({
              from: msg.senderId,
              to: msg.recipientId || (msg.isBroadcast ? null : clientId),
              broadcast: msg.isBroadcast,
              progress: 0,
              offset: i * 0.1,
              flameId: i,
            });
          }
        });

        // Feathers service event: 'rooms created'
        socket.on("rooms created", (room) => {
          currentRoomId = room.roomId;
          console.log(
            "Joined room",
            room.roomId,
            "with",
            room.partnerId === clientId ? room.userId : room.partnerId,
          );
        });
      }

      function sendMessage(broadcast = false) {
        const text = "Hello!";
        if (broadcast) {
          socket?.emit(
            "messages::create",
            { type: "broadcast", payload: text },
            {},
            (err) => {
              if (err) console.error("Broadcast error:", err);
            },
          );
        } else {
          const dest = selectedUser;
          if (dest) {
            socket?.emit(
              "messages::create",
              { type: "route", to: dest, payload: text },
              {},
              (err) => {
                if (err) console.error("Route error:", err);
              },
            );
          }
        }
      }

      // Start connection
      connect();
    </script>
  </body>
</html>
