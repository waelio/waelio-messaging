<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging Hub UI</title>
    <!-- Favicons & PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1976D2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      html,
      body,
      canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
    <script>
      // WebSocket URL
      const WS_URL =
        (location.protocol === "https:" ? "wss://" : "ws://") + location.host;

      // State variables
      let connected = false;
      let socket = null;
      let clientId = "";
      let users = [];
      let messages = [];
      let selectedUser = null;
      let reconnecting = false;
      let retryAttempt = 0;
      let nextRetryIn = 0;
      let reconnectTimer = null;
      let countdownTimer = null;

      // Canvas variables
      let userPositions = {};
      let messageAnimations = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        background(0);
        textAlign(CENTER, CENTER);
        textSize(16);
      }

      function draw() {
        background(0, 20); // slight fade

        // Draw users as circles in a circle
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;

        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          userPositions[user] = { x, y };

          fill(user === clientId ? "blue" : "green");
          if (user === selectedUser) {
            stroke("white");
            strokeWeight(3);
          } else {
            noStroke();
          }
          ellipse(x, y, 40, 40);
          noStroke();
          fill(255);
          text(user.substring(0, 8), x, y);
        });

        // Draw message animations
        messageAnimations.forEach((anim, index) => {
          anim.progress += 0.02;
          if (anim.progress >= 1) {
            messageAnimations.splice(index, 1);
            return;
          }

          const fromPos = userPositions[anim.from] || {
            x: centerX,
            y: centerY,
          };
          const toPos = userPositions[anim.to] || { x: centerX, y: centerY };
          const x = lerp(fromPos.x, toPos.x, anim.progress);
          const y = lerp(fromPos.y, toPos.y, anim.progress);

          fill(anim.broadcast ? "yellow" : "red");
          ellipse(x, y, 10, 10);
        });
      }

      function mousePressed() {
        // Find clicked user
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;
        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          const d = dist(mouseX, mouseY, x, y);
          if (d < 20) {
            // within circle
            selectedUser = user;
            sendMessage(false);
          }
        });
      }

      // WebSocket functions (adapted from original)
      function clearReconnectTimers() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (countdownTimer) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnecting = true;
        const delays = [1000, 2000, 5000, 10000, 20000, 30000];
        const idx = Math.min(retryAttempt, delays.length - 1);
        const delay = delays[idx];
        nextRetryIn = Math.ceil(delay / 1000);
        clearReconnectTimers();
        countdownTimer = setInterval(() => {
          if (nextRetryIn > 0) nextRetryIn -= 1;
        }, 1000);
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, delay);
        retryAttempt += 1;
      }

      function connect() {
        socket = new WebSocket(WS_URL);
        socket.onopen = () => {
          connected = true;
          reconnecting = false;
          clearReconnectTimers();
          console.log("Connected");
          retryAttempt = 0;
        };
        socket.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          switch (msg.type) {
            case "register-success":
              clientId = msg.id;
              console.log("Registered as", clientId);
              break;
            case "user-list":
              users = msg.users;
              console.log("Users:", users);
              break;
            case "message":
              messages.push({
                ...msg,
                ts: new Date(),
                me: msg.from === clientId,
              });
              // Add animation
              messageAnimations.push({
                from: msg.from,
                to: msg.to || (msg.isBroadcast ? null : clientId),
                broadcast: msg.isBroadcast,
                progress: 0,
              });
              break;
            case "message-history":
              msg.history.forEach((h) =>
                messages.push({
                  from: h.senderId,
                  payload: h.payload,
                  isBroadcast: h.isBroadcast,
                  ts: new Date(h.timestamp),
                  me: h.senderId === clientId,
                }),
              );
              break;
            case "user-joined":
              console.log("User joined", msg.id);
              break;
            case "user-left":
              console.log("User left", msg.id);
              break;
            case "error":
              console.error("Error", msg.message);
              break;
          }
        };
        socket.onclose = () => {
          connected = false;
          console.log("Disconnected");
          scheduleReconnect();
        };
        socket.onerror = () => console.error("Socket error");
      }

      function sendMessage(broadcast = false) {
        const text = "Hello!";
        if (broadcast) {
          socket?.send(JSON.stringify({ type: "broadcast", payload: text }));
        } else {
          const dest = selectedUser;
          if (dest) {
            socket?.send(
              JSON.stringify({ type: "route", to: dest, payload: text }),
            );
          }
        }
      }

      // Start connection
      connect();
    </script>
  </body>
</html>
