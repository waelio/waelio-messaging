<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging Hub UI</title>
    <!-- Favicons & PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1976D2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      html,
      body,
      canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
      }
      #toasts {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: rgba(30, 30, 30, 0.92);
        color: #fff;
        padding: 10px 16px;
        border-radius: 8px;
        font-family: Roboto, sans-serif;
        font-size: 14px;
        border-left: 4px solid #4caf50;
        animation: fadeInOut 3s forwards;
      }
      .toast.left {
        border-left-color: #f44336;
      }
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateX(20px);
        }
        15% {
          opacity: 1;
          transform: translateX(0);
        }
        75% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="toasts"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
      function showToast(text, type = "joined") {
        const container = document.getElementById("toasts");
        const el = document.createElement("div");
        el.className = "toast" + (type === "left" ? " left" : "");
        el.textContent = text;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3100);
      }

      // State variables
      let connected = false;
      let socket = null;
      let clientId = "";
      let users = [];
      let messages = [];
      let selectedUser = null;

      // Canvas variables
      let userPositions = {};
      let messageAnimations = [];
      let joinAnimations = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        background(0);
        textAlign(CENTER, CENTER);
        textSize(20);
      }

      function draw() {
        background(0, 20); // slight fade

        // Draw users as circles in a circle
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;

        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          userPositions[user] = { x, y };

          fill(user === clientId ? "blue" : "green");
          if (user === selectedUser) {
            stroke("white");
            strokeWeight(3);
          } else {
            noStroke();
          }
          ellipse(x, y, 80, 80);
          noStroke();
          fill(255);
          textAlign(CENTER, CENTER);
          text(user.substring(0, 6), x, y);
        });

        // Draw join animations — meteor flying in from edge with user ID label
        joinAnimations.forEach((anim, index) => {
          anim.progress += 0.012;
          if (anim.progress >= 1) {
            joinAnimations.splice(index, 1);
            return;
          }
          const toPos = userPositions[anim.id] || { x: centerX, y: centerY };
          const x = lerp(anim.fromX, toPos.x, anim.progress);
          const y = lerp(anim.fromY, toPos.y, anim.progress);
          const alpha =
            anim.progress < 0.8 ? 255 : ((1 - anim.progress) / 0.2) * 255;

          // Tail: series of fading line segments behind the head
          const tailLen = 10;
          for (let t = 1; t <= tailLen; t++) {
            const tp = Math.max(0, anim.progress - t * 0.018);
            const tx = lerp(anim.fromX, toPos.x, tp);
            const ty = lerp(anim.fromY, toPos.y, tp);
            const tailAlpha = alpha * (1 - t / tailLen);
            const sw = (1 - t / tailLen) * 4;
            strokeWeight(sw);
            stroke(180, 230, 255, tailAlpha);
            line(
              lerp(
                anim.fromX,
                toPos.x,
                Math.max(0, anim.progress - (t - 1) * 0.018),
              ),
              lerp(
                anim.fromY,
                toPos.y,
                Math.max(0, anim.progress - (t - 1) * 0.018),
              ),
              tx,
              ty,
            );
          }

          // Star head: a bright 4-point star shape
          noStroke();
          fill(255, 255, 255, alpha);
          const s = 8;
          push();
          translate(x, y);
          beginShape();
          for (let i = 0; i < 8; i++) {
            const r = i % 2 === 0 ? s : s * 0.35;
            const a = (TWO_PI / 8) * i - HALF_PI;
            vertex(cos(a) * r, sin(a) * r);
          }
          endShape(CLOSE);
          pop();

          // Label above the head
          noStroke();
          fill(200, 240, 255, alpha);
          textAlign(CENTER, CENTER);
          textSize(12);
          text(anim.id.substring(0, 8), x, y - 18);
          textSize(20);
        });

        // Draw message animations (flames/meteors)
        messageAnimations.forEach((anim, index) => {
          anim.progress += 0.015;

          const effectiveProgress = Math.max(
            0,
            anim.progress - (anim.offset || 0),
          );

          if (effectiveProgress >= 1) {
            messageAnimations.splice(index, 1);
            return;
          }

          const fromPos = userPositions[anim.from] || {
            x: centerX,
            y: centerY,
          };
          const toPos = userPositions[anim.to] || { x: centerX, y: centerY };
          const x = lerp(fromPos.x, toPos.x, effectiveProgress);
          const y = lerp(fromPos.y, toPos.y, effectiveProgress);

          const size = 20 + sin(effectiveProgress * PI * 4) * 8;
          const alpha = (1 - effectiveProgress) * 255;

          if (anim.broadcast) {
            fill(255, 255, 0, alpha);
          } else {
            fill(
              anim.flameId === 0
                ? color(255, 100, 0, alpha)
                : color(255, 50, 0, alpha),
            );
          }

          noStroke();
          ellipse(x, y, size * 1.5, size * 0.7);
          fill(255, 200, 0, alpha * 0.3);
          ellipse(x, y, size * 2.5, size * 1.2);
        });
      }

      function mousePressed() {
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;
        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          const d = dist(mouseX, mouseY, x, y);
          if (d < 40 && user !== clientId) {
            selectedUser = user;
            sendMessage(false);
          }
        });
      }

      function addFlameAnimation(from, to, broadcast) {
        for (let i = 0; i < 2; i++) {
          messageAnimations.push({
            from,
            to,
            broadcast,
            progress: 0,
            offset: i * 0.1,
            flameId: i,
          });
        }
      }

      function connect() {
        const _backendUrl = "__BACKEND_URL__";
        socket = io(_backendUrl || undefined);

        socket.on("connect", () => {
          connected = true;
          console.log("Connected, socket id:", socket.id);
          // Request history after connecting
          socket.emit("find", "messages", {}, (err, history) => {
            if (err) return console.error("History error:", err);
            (history || []).forEach((h) =>
              messages.push({
                from: h.senderId,
                to: h.recipientId,
                payload: h.payload,
                isBroadcast: h.isBroadcast,
                ts: new Date(h.timestamp),
                me: h.senderId === clientId,
              }),
            );
          });
        });

        socket.on("disconnect", () => {
          connected = false;
          console.log("Disconnected");
        });

        socket.on("register-success", (msg) => {
          clientId = msg.id;
          console.log("Registered as", clientId);
        });

        socket.on("user-list", (msg) => {
          users = msg.users;
          console.log("Users:", users);
        });

        socket.on("user-joined", (msg) => {
          console.log("User joined", msg.id);
          showToast(`🟢 ${msg.id.substring(0, 8)} joined`, "joined");
          // Shoot a meteor in from the right edge
          const W = window.innerWidth,
            H = window.innerHeight;
          const fromX = W + 40;
          const fromY = Math.random() * H;
          joinAnimations.push({ id: msg.id, fromX, fromY, progress: 0 });
        });

        socket.on("user-left", (msg) => {
          console.log("User left", msg.id);
          showToast(`🔴 ${msg.id.substring(0, 8)} left`, "left");
        });

        // Feathers service event: 'messages created'
        socket.on("messages created", (msg) => {
          messages.push({
            from: msg.senderId,
            to: msg.recipientId,
            payload: msg.payload,
            isBroadcast: msg.isBroadcast,
            ts: new Date(msg.timestamp),
            me: msg.senderId === clientId,
          });
          addFlameAnimation(
            msg.senderId,
            msg.isBroadcast
              ? null
              : msg.senderId === clientId
                ? msg.recipientId
                : clientId,
            msg.isBroadcast,
          );
        });
      }

      function sendMessage(broadcast = false) {
        if (!socket || !connected) return;
        const text = "Hello!";
        if (broadcast) {
          socket.emit(
            "create",
            "messages",
            { type: "broadcast", payload: text },
            {},
          );
        } else if (selectedUser) {
          socket.emit(
            "create",
            "messages",
            { type: "route", to: selectedUser, payload: text },
            {},
          );
        }
      }

      // Start connection
      connect();
    </script>
  </body>
</html>
