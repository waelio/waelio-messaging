<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging Hub UI</title>
    <!-- Favicons & PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1976D2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      html,
      body,
      canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
      }
      #toasts {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: rgba(30, 30, 30, 0.92);
        color: #fff;
        padding: 10px 16px;
        border-radius: 8px;
        font-family: Roboto, sans-serif;
        font-size: 14px;
        border-left: 4px solid #4caf50;
        animation: fadeInOut 3s forwards;
      }
      .toast.left {
        border-left-color: #f44336;
      }
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateX(20px);
        }
        15% {
          opacity: 1;
          transform: translateX(0);
        }
        75% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      #requestPopup {
        position: fixed;
        background: rgba(10, 14, 30, 0.96);
        color: #d0e4ff;
        border: 1px solid rgba(100, 160, 255, 0.45);
        border-radius: 10px;
        padding: 14px 18px 14px 16px;
        font-family: Roboto, monospace, sans-serif;
        font-size: 13px;
        min-width: 230px;
        max-width: 320px;
        z-index: 10000;
        box-shadow: 0 4px 28px rgba(0, 60, 180, 0.45);
        display: none;
        pointer-events: auto;
      }
      #requestPopup .popup-title {
        font-size: 14px;
        font-weight: 500;
        color: #7ab4ff;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(100, 160, 255, 0.3);
      }
      #requestPopup .popup-row {
        margin: 6px 0;
        word-break: break-all;
        line-height: 1.4;
      }
      #requestPopup .popup-label {
        color: #7090b0;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      #requestPopup .popup-value {
        color: #d0e4ff;
        font-size: 12px;
      }
      #requestPopup .popup-close {
        position: absolute;
        top: 8px;
        right: 10px;
        cursor: pointer;
        color: #7090b0;
        font-size: 16px;
        line-height: 1;
      }
      #requestPopup .popup-close:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="toasts"></div>
    <div id="requestPopup">
      <span class="popup-close" id="popupCloseBtn">✕</span>
      <div class="popup-title">📡 Request Info</div>
      <div id="popupContent"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
      function showToast(text, type = "joined") {
        const container = document.getElementById("toasts");
        const el = document.createElement("div");
        el.className = "toast" + (type === "left" ? " left" : "");
        el.textContent = text;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3100);
      }

      // State variables
      let connected = false;
      let socket = null;
      let clientId = "";
      let users = [];
      let messages = [];
      let selectedUser = null;

      // Canvas variables
      let userPositions = {};
      let messageAnimations = [];
      let joinAnimations = [];

      // Constants
      const STAR_CLICK_RADIUS = 25;
      const POPUP_WIDTH_MARGIN = 340;
      const POPUP_HEIGHT_MARGIN = 230;

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setup() {
        createCanvas(windowWidth, windowHeight);
        background(0);
        textAlign(CENTER, CENTER);
        textSize(20);
      }

      function draw() {
        background(0, 20); // slight fade

        // Draw users as circles in a circle
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;

        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          userPositions[user] = { x, y };

          fill(user === clientId ? "blue" : "green");
          if (user === selectedUser) {
            stroke("white");
            strokeWeight(3);
          } else {
            noStroke();
          }
          ellipse(x, y, 80, 80);
          noStroke();
          fill(255);
          textAlign(CENTER, CENTER);
          text(user.substring(0, 6), x, y);
        });

        // Draw join animations — meteor flying in from edge with user ID label
        joinAnimations.forEach((anim, index) => {
          anim.progress += 0.012;
          if (anim.progress >= 1) {
            joinAnimations.splice(index, 1);
            return;
          }
          const toPos = userPositions[anim.id] || { x: centerX, y: centerY };
          const x = lerp(anim.fromX, toPos.x, anim.progress);
          const y = lerp(anim.fromY, toPos.y, anim.progress);
          const alpha =
            anim.progress < 0.8 ? 255 : ((1 - anim.progress) / 0.2) * 255;

          // Tail: series of fading line segments behind the head
          const tailLen = 10;
          for (let t = 1; t <= tailLen; t++) {
            const tp = Math.max(0, anim.progress - t * 0.018);
            const tx = lerp(anim.fromX, toPos.x, tp);
            const ty = lerp(anim.fromY, toPos.y, tp);
            const tailAlpha = alpha * (1 - t / tailLen);
            const sw = (1 - t / tailLen) * 4;
            strokeWeight(sw);
            stroke(180, 230, 255, tailAlpha);
            line(
              lerp(
                anim.fromX,
                toPos.x,
                Math.max(0, anim.progress - (t - 1) * 0.018),
              ),
              lerp(
                anim.fromY,
                toPos.y,
                Math.max(0, anim.progress - (t - 1) * 0.018),
              ),
              tx,
              ty,
            );
          }

          // Star head: a bright 4-point star shape
          noStroke();
          fill(255, 255, 255, alpha);
          const s = 8;
          push();
          translate(x, y);
          beginShape();
          for (let i = 0; i < 8; i++) {
            const r = i % 2 === 0 ? s : s * 0.35;
            const a = (TWO_PI / 8) * i - HALF_PI;
            vertex(cos(a) * r, sin(a) * r);
          }
          endShape(CLOSE);
          pop();

          // Label above the head
          noStroke();
          fill(200, 240, 255, alpha);
          textAlign(CENTER, CENTER);
          textSize(12);
          text(anim.id.substring(0, 8), x, y - 18);
          textSize(20);
        });

        // Draw message animations (falling stars with labels)
        messageAnimations.forEach((anim, index) => {
          anim.progress += 0.015;

          const effectiveProgress = Math.max(
            0,
            anim.progress - (anim.offset || 0),
          );

          if (effectiveProgress >= 1) {
            messageAnimations.splice(index, 1);
            return;
          }

          const fromPos = userPositions[anim.from] || {
            x: centerX,
            y: centerY,
          };
          const toPos = anim.broadcast
            ? { x: centerX, y: centerY }
            : userPositions[anim.to] || { x: centerX, y: centerY };

          const x = lerp(fromPos.x, toPos.x, effectiveProgress);
          const y = lerp(fromPos.y, toPos.y, effectiveProgress);
          const alpha =
            effectiveProgress < 0.8
              ? 255
              : ((1 - effectiveProgress) / 0.2) * 255;

          // Store current position for click detection
          anim.currentX = x;
          anim.currentY = y;

          // Tail: series of fading line segments behind the head
          const tailLen = 10;
          for (let t = 1; t <= tailLen; t++) {
            const tp = Math.max(0, effectiveProgress - t * 0.018);
            const tx = lerp(fromPos.x, toPos.x, tp);
            const ty = lerp(fromPos.y, toPos.y, tp);
            const tailAlpha = alpha * (1 - t / tailLen);
            const sw = (1 - t / tailLen) * 4;
            strokeWeight(sw);
            stroke(
              anim.broadcast
                ? color(255, 255, 100, tailAlpha)
                : color(255, 150, 50, tailAlpha),
            );
            line(
              lerp(
                fromPos.x,
                toPos.x,
                Math.max(0, effectiveProgress - (t - 1) * 0.018),
              ),
              lerp(
                fromPos.y,
                toPos.y,
                Math.max(0, effectiveProgress - (t - 1) * 0.018),
              ),
              tx,
              ty,
            );
          }

          // Star head: a bright 8-point star shape
          noStroke();
          fill(
            anim.broadcast
              ? color(255, 255, 0, alpha)
              : color(255, 150, 50, alpha),
          );
          const s = 9;
          push();
          translate(x, y);
          beginShape();
          for (let i = 0; i < 8; i++) {
            const r = i % 2 === 0 ? s : s * 0.35;
            const a = (TWO_PI / 8) * i - HALF_PI;
            vertex(cos(a) * r, sin(a) * r);
          }
          endShape(CLOSE);
          pop();

          // Address label above the star head (click the star to reveal request info)
          noStroke();
          fill(
            anim.broadcast
              ? color(255, 255, 100, alpha)
              : color(255, 210, 120, alpha),
          );
          textAlign(CENTER, CENTER);
          textSize(11);
          text("⬡ " + anim.from.substring(0, 8), x, y - 18);
          textSize(20);
        });
      }

      function mouseMoved() {
        let overStar = false;
        for (const anim of messageAnimations) {
          if (anim.currentX && anim.currentY) {
            if (dist(mouseX, mouseY, anim.currentX, anim.currentY) < STAR_CLICK_RADIUS) {
              overStar = true;
              break;
            }
          }
        }
        cursor(overStar ? HAND : ARROW);
      }

      function mousePressed() {
        // Close popup if open
        closePopup();

        // Check if click is on any active message star (within STAR_CLICK_RADIUS)
        for (const anim of messageAnimations) {
          if (anim.currentX && anim.currentY) {
            const d = dist(mouseX, mouseY, anim.currentX, anim.currentY);
            if (d < STAR_CLICK_RADIUS) {
              showRequestPopup(anim, mouseX, mouseY);
              return;
            }
          }
        }

        // Check if click is on a user circle to send a direct message
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;
        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          const d = dist(mouseX, mouseY, x, y);
          if (d < 40 && user !== clientId) {
            selectedUser = user;
            sendMessage(false);
          }
        });
      }

      function showRequestPopup(anim, px, py) {
        const popup = document.getElementById("requestPopup");
        const content = document.getElementById("popupContent");
        const ts = anim.timestamp
          ? new Date(anim.timestamp).toLocaleTimeString()
          : "—";
        const toValue = anim.broadcast
          ? "(broadcast — all users)"
          : escapeHtml(anim.to || "unknown");
        content.innerHTML = `
          <div class="popup-row">
            <div class="popup-label">From (address)</div>
            <div class="popup-value">${escapeHtml(anim.from)}</div>
          </div>
          <div class="popup-row">
            <div class="popup-label">To</div>
            <div class="popup-value">${toValue}</div>
          </div>
          <div class="popup-row">
            <div class="popup-label">Payload</div>
            <div class="popup-value">${escapeHtml(anim.payload || "—")}</div>
          </div>
          <div class="popup-row">
            <div class="popup-label">Type</div>
            <div class="popup-value">${anim.broadcast ? "Broadcast" : "Direct"}</div>
          </div>
          <div class="popup-row">
            <div class="popup-label">Time</div>
            <div class="popup-value">${escapeHtml(ts)}</div>
          </div>
        `;
        const maxLeft = window.innerWidth - POPUP_WIDTH_MARGIN;
        const maxTop = window.innerHeight - POPUP_HEIGHT_MARGIN;
        popup.style.left = Math.min(px + 12, maxLeft) + "px";
        popup.style.top = Math.min(py + 12, maxTop) + "px";
        popup.style.display = "block";
      }

      function closePopup() {
        document.getElementById("requestPopup").style.display = "none";
      }

      function addStarAnimation(from, to, broadcast, payload, timestamp) {
        messageAnimations.push({
          from,
          to,
          broadcast,
          payload: payload || "",
          timestamp: timestamp || new Date().toISOString(),
          progress: 0,
          currentX: 0,
          currentY: 0,
        });
      }

      function connect() {
        const _backendUrl = "__BACKEND_URL__";
        socket = io(_backendUrl || undefined);

        socket.on("connect", () => {
          connected = true;
          console.log("Connected, socket id:", socket.id);
          // Request history after connecting
          socket.emit("find", "messages", {}, (err, history) => {
            if (err) return console.error("History error:", err);
            (history || []).forEach((h) =>
              messages.push({
                from: h.senderId,
                to: h.recipientId,
                payload: h.payload,
                isBroadcast: h.isBroadcast,
                ts: new Date(h.timestamp),
                me: h.senderId === clientId,
              }),
            );
          });
        });

        socket.on("disconnect", () => {
          connected = false;
          console.log("Disconnected");
        });

        socket.on("register-success", (msg) => {
          clientId = msg.id;
          console.log("Registered as", clientId);
        });

        socket.on("user-list", (msg) => {
          users = msg.users;
          console.log("Users:", users);
        });

        socket.on("user-joined", (msg) => {
          console.log("User joined", msg.id);
          showToast(`🟢 ${msg.id.substring(0, 8)} joined`, "joined");
          // Shoot a meteor in from the right edge
          const W = window.innerWidth,
            H = window.innerHeight;
          const fromX = W + 40;
          const fromY = Math.random() * H;
          joinAnimations.push({ id: msg.id, fromX, fromY, progress: 0 });
        });

        socket.on("user-left", (msg) => {
          console.log("User left", msg.id);
          showToast(`🔴 ${msg.id.substring(0, 8)} left`, "left");
        });

        // Feathers service event: 'messages created'
        socket.on("messages created", (msg) => {
          messages.push({
            from: msg.senderId,
            to: msg.recipientId,
            payload: msg.payload,
            isBroadcast: msg.isBroadcast,
            ts: new Date(msg.timestamp),
            me: msg.senderId === clientId,
          });
          addStarAnimation(
            msg.senderId,
            msg.isBroadcast
              ? null
              : msg.senderId === clientId
                ? msg.recipientId
                : clientId,
            msg.isBroadcast,
            msg.payload,
            msg.timestamp,
          );
        });
      }

      function sendMessage(broadcast = false) {
        if (!socket || !connected) return;
        const text = "Hello!";
        if (broadcast) {
          socket.emit(
            "create",
            "messages",
            { type: "broadcast", payload: text },
            {},
          );
        } else if (selectedUser) {
          socket.emit(
            "create",
            "messages",
            { type: "route", to: selectedUser, payload: text },
            {},
          );
        }
      }

      // Start connection
      connect();
      document.getElementById("popupCloseBtn").addEventListener("click", closePopup);
    </script>
  </body>
</html>
