<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging Hub UI</title>
    <!-- Favicons & PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1976D2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      html,
      body,
      canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
      }
      #toasts {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: rgba(30, 30, 30, 0.92);
        color: #fff;
        padding: 10px 16px;
        border-radius: 8px;
        font-family: Roboto, sans-serif;
        font-size: 14px;
        border-left: 4px solid #4caf50;
        animation: fadeInOut 3s forwards;
      }
      .toast.left {
        border-left-color: #f44336;
      }
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateX(20px);
        }
        15% {
          opacity: 1;
          transform: translateX(0);
        }
        75% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="toasts"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
    <script>
      function showToast(text, type = "joined") {
        const container = document.getElementById("toasts");
        const el = document.createElement("div");
        el.className = "toast" + (type === "left" ? " left" : "");
        el.textContent = text;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3100);
      }
      // WebSocket URL
      const WS_URL =
        (location.protocol === "https:" ? "wss://" : "ws://") + location.host;

      // State variables
      let connected = false;
      let socket = null;
      let clientId = "";
      let users = [];
      let messages = [];
      let selectedUser = null;
      let reconnecting = false;
      let retryAttempt = 0;
      let nextRetryIn = 0;
      let reconnectTimer = null;
      let countdownTimer = null;

      // Canvas variables
      let userPositions = {};
      let messageAnimations = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        background(0);
        textAlign(CENTER, CENTER);
        textSize(20);
      }

      function draw() {
        background(0, 20); // slight fade

        // Draw users as circles in a circle
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;

        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          userPositions[user] = { x, y };

          fill(user === clientId ? "blue" : "green");
          if (user === selectedUser) {
            stroke("white");
            strokeWeight(3);
          } else {
            noStroke();
          }
          ellipse(x, y, 80, 80);
          noStroke();
          fill(255);
          textAlign(CENTER, CENTER);
          text(user.substring(0, 6), x, y);
        });

        // Draw message animations (flames/meteors)
        messageAnimations.forEach((anim, index) => {
          anim.progress += 0.015; // Slower for better visibility

          // Apply offset delay for second flame
          const effectiveProgress = Math.max(
            0,
            anim.progress - (anim.offset || 0),
          );

          if (effectiveProgress >= 1) {
            messageAnimations.splice(index, 1);
            return;
          }

          const fromPos = userPositions[anim.from] || {
            x: centerX,
            y: centerY,
          };
          const toPos = userPositions[anim.to] || { x: centerX, y: centerY };
          const x = lerp(fromPos.x, toPos.x, effectiveProgress);
          const y = lerp(fromPos.y, toPos.y, effectiveProgress);

          // Flame/meteor appearance
          const size = 20 + sin(effectiveProgress * PI * 4) * 8; // Bigger pulsing size
          const alpha = (1 - effectiveProgress) * 255; // Fade out

          // Color based on message type and flame
          if (anim.broadcast) {
            fill(255, 255, 0, alpha); // Yellow for broadcast
          } else {
            // Red-orange flame colors
            if (anim.flameId === 0) {
              fill(255, 100, 0, alpha); // Orange flame
            } else {
              fill(255, 50, 0, alpha); // Red flame
            }
          }

          noStroke();
          // Draw elongated flame shape
          ellipse(x, y, size * 1.5, size * 0.7);

          // Add a small glow/trail effect
          fill(255, 200, 0, alpha * 0.3);
          ellipse(x, y, size * 2.5, size * 1.2);
        });
      }

      function mousePressed() {
        // Find clicked user
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = min(width, height) / 4;
        const angleStep = TWO_PI / users.length;
        users.forEach((user, i) => {
          const angle = i * angleStep;
          const x = centerX + cos(angle) * radius;
          const y = centerY + sin(angle) * radius;
          const d = dist(mouseX, mouseY, x, y);
          if (d < 40 && user !== clientId) {
            // within circle
            selectedUser = user;
            sendMessage(false);
          }
        });
      }

      // WebSocket functions (adapted from original)
      function clearReconnectTimers() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (countdownTimer) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnecting = true;
        const delays = [1000, 2000, 5000, 10000, 20000, 30000];
        const idx = Math.min(retryAttempt, delays.length - 1);
        const delay = delays[idx];
        nextRetryIn = Math.ceil(delay / 1000);
        clearReconnectTimers();
        countdownTimer = setInterval(() => {
          if (nextRetryIn > 0) nextRetryIn -= 1;
        }, 1000);
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, delay);
        retryAttempt += 1;
      }

      function connect() {
        socket = new WebSocket(WS_URL);
        socket.onopen = () => {
          connected = true;
          reconnecting = false;
          clearReconnectTimers();
          console.log("Connected");
          retryAttempt = 0;
        };
        socket.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          switch (msg.type) {
            case "register-success":
              clientId = msg.id;
              console.log("Registered as", clientId);
              break;
            case "user-list":
              users = msg.users;
              console.log("Users:", users);
              break;
            case "message":
              messages.push({
                ...msg,
                ts: new Date(),
                me: msg.from === clientId,
              });
              // Add 2 flame animations per message
              for (let i = 0; i < 2; i++) {
                messageAnimations.push({
                  from: msg.from,
                  to: msg.to || (msg.isBroadcast ? null : clientId),
                  broadcast: msg.isBroadcast,
                  progress: 0,
                  offset: i * 0.1, // Slight delay between flames
                  flameId: i,
                });
              }
              break;
            case "message-history":
              msg.history.forEach((h) =>
                messages.push({
                  from: h.senderId,
                  payload: h.payload,
                  isBroadcast: h.isBroadcast,
                  ts: new Date(h.timestamp),
                  me: h.senderId === clientId,
                }),
              );
              break;
            case "user-joined":
              console.log("User joined", msg.id);
              showToast(`🟢 ${msg.id.substring(0, 8)} joined`, "joined");
              break;
            case "user-left":
              console.log("User left", msg.id);
              showToast(`🔴 ${msg.id.substring(0, 8)} left`, "left");
              break;
            case "error":
              console.error("Error", msg.message);
              break;
          }
        };
        socket.onclose = () => {
          connected = false;
          console.log("Disconnected");
          scheduleReconnect();
        };
        socket.onerror = () => console.error("Socket error");
      }

      function sendMessage(broadcast = false) {
        const text = "Hello!";
        if (broadcast) {
          socket?.send(JSON.stringify({ type: "broadcast", payload: text }));
        } else {
          const dest = selectedUser;
          if (dest) {
            socket?.send(
              JSON.stringify({ type: "route", to: dest, payload: text }),
            );
          }
        }
      }

      // Start connection
      connect();
    </script>
  </body>
</html>
